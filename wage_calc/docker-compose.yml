services:
  web:
    build: .
    container_name: wc_app
    restart: always
    # This maps the .env file variables into the container environment
    env_file:
      - .env
    volumes:
      - .:/app
    command: reflex run
    ports:
      - "3000:3000"  # Frontend
      - "8400:8000"  # Backend API
    depends_on:
      - wc_db

  wc_db:
    image: postgres:15-alpine
    container_name: wc_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: